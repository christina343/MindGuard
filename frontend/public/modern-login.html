<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Login - Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #081b29;
    }

    .wrapper {
      position: relative;
      width: 850px;
      height: 500px;
      background: #081b29;
      border: 2px solid #00efff;
      box-shadow: 0 0 25px #00efff;
      overflow: hidden;
    }

    .bg-animate {
      position: absolute;
      top: 0;
      right: 0;
      width: 850px;
      height: 100%;
      background: linear-gradient(45deg, #081b29, #00efff);
      border-bottom: 3px solid #00efff;
      transform: rotate(10deg) skewY(40deg);
      transform-origin: bottom right;
      transition: 1.5s ease;
      z-index: 6;
    }

    .wrapper.active .bg-animate {
      transform: rotate(0) skewY(0) translateX(-100%);
    }

    .bg-animate2 {
      position: absolute;
      top: 0;
      left: 0;
      width: 850px;
      height: 100%;
      background: #081b29;
      border-top: 3px solid #00efff;
      transition: 1.5s ease;
      z-index: 1;
    }

    .wrapper.active .bg-animate2 {
      transform: rotate(-10deg) skewY(-40deg);
      background: linear-gradient(-45deg, #00efff, #081b29);
      z-index: 6;
    }

    .form-box {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 40px;
      color: #fff;
      z-index: 7;
      transition: 0.6s ease;
    }

    .form-box.login {
      left: 0;
      transition-delay: 0.7s;
    }

    .wrapper.active .form-box.login {
      transform: translateX(-100%);
      transition-delay: 0s;
    }

    .form-box.signup {
      right: 0;
      transform: translateX(100%);
    }

    .wrapper.active .form-box.signup {
      transform: translateX(0);
      transition-delay: 0.7s;
    }

    .info-text {
      position: absolute;
      top: 0;
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 40px;
      color: #fff;
      z-index: 7;
      transition: 0.6s ease;
    }

    .info-text.login {
      right: 0;
      text-align: right;
      transition-delay: 0.7s;
    }

    .wrapper.active .info-text.login {
      transform: translateX(100%);
      transition-delay: 0s;
    }

    .info-text.signup {
      left: 0;
      text-align: left;
      transform: translateX(-100%);
    }

    .wrapper.active .info-text.signup {
      transform: translateX(0);
      transition-delay: 0.7s;
    }

    h2 {
      font-size: 32px;
      text-align: center;
      margin-bottom: 10px;
    }

    .input-box {
      position: relative;
      width: 100%;
      height: 50px;
      border-bottom: 2px solid #fff;
      margin: 25px 0;
    }

    .input-box input {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 16px;
      color: #fff;
      padding-right: 28px;
    }

    .input-box label {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      transition: .5s;
    }

    .input-box input:focus ~ label,
    .input-box input:valid ~ label {
      top: -5px;
    }

    .input-box i {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #00efff;
    }

    .btn {
      width: 100%;
      height: 45px;
      background: transparent;
      border: 2px solid #00efff;
      border-radius: 40px;
      cursor: pointer;
      color: #fff;
      font-weight: 600;
      transition: .5s;
    }

    .btn:hover {
      background: #00efff;
      color: #081b29;
      box-shadow: 0 0 20px #00efff;
    }

    .logreg-link {
      text-align: center;
      margin-top: 20px;
    }

    .logreg-link a {
      color: #00efff;
      cursor: pointer;
      text-decoration: none;
    }

    .logreg-link a:hover {
      text-decoration: underline;
    }

    .info-text h2 {
      font-size: 36px;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .wrapper {
        width: 90%;
      }
    }

    @media (max-width: 768px) {
      .wrapper {
        width: 100%;
        height: auto;
        min-height: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper" id="wrapper">
    <span class="bg-animate"></span>
    <span class="bg-animate2"></span>

    <!-- Login Form -->
    <div class="form-box login">
      <h2>Login</h2>
      <form onsubmit="return false;">
        <div class="input-box">
          <input type="text" required />
          <label>Username</label>
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input type="password" required />
          <label>Password</label>
          <i class="bx bxs-lock-alt"></i>
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="logreg-link">
          <p>Don't have an account? <a onclick="toggleActive()">Sign Up</a></p>
        </div>
      </form>
    </div>

    <!-- Signup Form -->
    <div class="form-box signup">
      <h2>Sign Up</h2>
      <form onsubmit="return false;">
        <div class="input-box">
          <input type="text" required />
          <label>Username</label>
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input type="email" required />
          <label>Email</label>
          <i class="bx bxs-envelope"></i>
        </div>
        <div class="input-box">
          <input type="password" required />
          <label>Password</label>
          <i class="bx bxs-lock-alt"></i>
        </div>
        <button type="submit" class="btn">Register</button>
        <div class="logreg-link">
          <p>Already have an account? <a onclick="toggleActive()">Login</a></p>
        </div>
      </form>
    </div>

    <!-- Info Text - Login -->
    <div class="info-text login">
      <h2>WELCOME BACK!</h2>
      <p>Hope, You and your Family have a Great Day</p>
    </div>

    <!-- Info Text - Signup -->
    <div class="info-text signup">
      <h2>WELCOME!</h2>
      <p>Hope, You and your Family have a Great Day</p>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('wrapper');
    
    function toggleActive() {
      wrapper.classList.toggle('active');
    }
  </script>
</body>
</html>
